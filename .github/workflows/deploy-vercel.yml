# Deploy to Vercel production on push to main.
# Production: https://frontend-two-hazel-29.vercel.app
#
# Add GitHub secret: VERCEL_TOKEN → https://vercel.com/account/tokens

name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Q9fDNbEuIfJaYrAXCb3GJNsV
      VERCEL_PROJECT_ID: prj_Strv6aLkoKP6mkPrs93zraZnrvbE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
